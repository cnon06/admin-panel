<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav
        class="navbar bg-dark border-bottom border-body navbar-expand-lg"
        data-bs-theme="dark"
      >
        <div class="container">
          <a href="index.html" class="navbar-brand">Admin Panel</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a href="category.html" class="nav-link">Categories</a>
              </li>
              <li class="nav-item">
                <a href="product.html" class="nav-link">Products</a>
              </li>
              <li class="nav-item">
                <a href="slider.html" class="nav-link">Slider</a>
              </li>
              <li class="nav-item">
                <a href="role.html" class="nav-link">Role</a>
              </li>
              <li class="nav-item">
                <a href="users.html" class="nav-link">Users</a>
              </li>
              <li class="nav-item">
                <a href="order.html" class="nav-link">Orders</a>
              </li>
            </ul>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item dropdown">
                <a
                  href="#"
                  class="nav-link dropdown-toggle"
                  data-bs-toggle="dropdown"
                  >Sinan ALAGÖZ</a
                >
                <ul class="dropdown-menu">
                  <li><a href="myaccount.html" class="dropdown-item">My Account</a></li>
                  <li><a href="login.html" class="dropdown-item">Exit</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a href="login.html" class="nav-link active">Sign In</a>
              </li>
              <li class="nav-item">
                <a href="sign-up.html" class="nav-link">Sign Up</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow">
            <div class="card-header py-2 text-center">
              <h5 class="card-title mb-0">My Account</h5>
            </div>
            <div class="card-body">
              <form>
                <div class="text-center mb-4">
                  <div id="profilePlaceholder" class="rounded-circle bg-secondary d-flex align-items-center justify-content-center mx-auto mb-2" style="width:100px;height:100px;">
                    <i class="fa fa-user fa-3x text-white"></i>
                  </div>
                  <img
                    src=""
                    alt="Profile Photo"
                    class="rounded-circle mb-2 d-none"
                    width="100"
                    height="100"
                    id="profilePreview"
                  />
                  <div>
                    <label for="profilePhoto" class="btn btn-sm btn-outline-secondary">
                      <i class="fa fa-camera me-1"></i>Change Photo
                    </label>
                    <input type="file" id="profilePhoto" class="d-none" accept="image/*" onchange="previewPhoto(this)" />
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" id="firstName" class="form-control" value="Sinan" />
                  </div>
                  <div class="col-md-6">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" id="lastName" class="form-control" value="ALAGÖZ" />
                  </div>
                </div>

                <div class="mb-3">
                  <label for="accountEmail" class="form-label">Email</label>
                  <input type="email" id="accountEmail" class="form-control" value="sinanalagoz74@gmail.com" />
                </div>

                <div class="mb-3">
                  <label for="accountPhone" class="form-label">Phone</label>
                  <input type="tel" id="accountPhone" class="form-control" placeholder="Enter your phone number" />
                </div>

                <hr class="my-4" />
                <h6 class="mb-3 text-muted">Change Password</h6>

                <div class="mb-3">
                  <label for="currentPassword" class="form-label">Current Password</label>
                  <input type="password" id="currentPassword" class="form-control" placeholder="Enter current password" />
                </div>

                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" />
                  </div>
                  <div class="col-md-6">
                    <label for="confirmPassword" class="form-label">Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" />
                  </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                  <a href="index.html" class="btn btn-secondary">Cancel</a>
                  <button type="submit" class="btn btn-primary">
                    <i class="fa fa-save me-1"></i>Save Changes
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      function previewPhoto(input) {
        if (input.files && input.files[0]) {
          const reader = new FileReader();
          reader.onload = (e) => {
            const preview = document.getElementById('profilePreview');
            const placeholder = document.getElementById('profilePlaceholder');
            preview.src = e.target.result;
            preview.classList.remove('d-none');
            placeholder.classList.add('d-none');
          };
          reader.readAsDataURL(input.files[0]);
        }
      }
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
