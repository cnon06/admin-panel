    <link

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav
        class="navbar bg-dark border-bottom border-body navbar-expand-lg"
        data-bs-theme="dark"

        <div class="container">
          <a href="index.html" class="navbar-brand">Admin Panel</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a href="category.html" class="nav-link">Categories</a>
              </li>
              <li class="nav-item">
                <a href="product.html" class="nav-link">Products</a>
              </li>
              <li class="nav-item">
                <a href="slider.html" class="nav-link">Slider</a>
              </li>
              <li class="nav-item">
                <a href="role.html" class="nav-link">Role</a>
              </li>
              <li class="nav-item">
                <a href="users.html" class="nav-link active">Users</a>
              </li>

                <a href="order.html" class="nav-link">Orders</a>

            </ul>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item dropdown">
                <a
                  href="#"
                  class="nav-link dropdown-toggle"
                  data-bs-toggle="dropdown"
                  >Sinan ALAGÖZ</a
                >
                <ul class="dropdown-menu">
                  <li><a href="myaccount.html" class="dropdown-item">My Account</a></li>
                  <li><a href="login.html" class="dropdown-item">Exit</a></li>
                </ul>

              <li class="nav-item">
                <a href="login.html" class="nav-link">Sign In</a>
              </li>
              <li class="nav-item">
                <a href="sign-up.html" class="nav-link">Sign Up</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-3">
      <div class="row">
        <div class="col-md-9">
          <div class="card shadow">
            <div
              class="card-header py-1 d-flex justify-content-between align-items-center"
            >
              <h5 class="card-title">Add User</h5>
              <a href="users.html" class="btn btn-sm btn-primary">
                <i class="fa-solid fa-list"></i>
              </a>
            </div>

            <div class="card-body">
              <form>
                <div class="row mb-3">
                  <label for="userName" class="col-sm-2 col-form-label">User Name</label>
                  <div class="col-sm-10">
                    <input type="text" id="userName" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="nameSurname" class="col-sm-2 col-form-label">Name Surname</label>
                  <div class="col-sm-10">
                    <input type="text" id="nameSurname" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="userEmail" class="col-sm-2 col-form-label">Email</label>
                  <div class="col-sm-10">
                    <input type="email" id="userEmail" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="userRole" class="col-sm-2 col-form-label">Role</label>
                  <div class="col-sm-10">
                    <select id="userRole" class="form-select">
                      <option value="">Please Select</option>
                      <option value="admin">Admin</option>
                      <option value="editor">Editor</option>
                      <option value="user">User</option>
                    </select>
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="userApproval" class="col-sm-2 col-form-label">Approval</label>
                  <div class="col-sm-10">
                    <input type="checkbox" id="userApproval" class="form-check-input" />
                  </div>
                </div>
                <div class="row mb-3">
                  <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card shadow">
            <div class="card-body text-center">
              <img src="https://i.pravatar.cc/150?img=1" alt="user avatar" class="rounded-circle img-thumbnail" style="width:120px;height:120px;object-fit:cover;" />
              <input type="file" class="form-control mt-3" />
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
